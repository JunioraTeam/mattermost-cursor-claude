services:
  mattermost-cursor-bot:
    build: .
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "${APPROVAL_HTTP_PORT:-3847}:${APPROVAL_HTTP_PORT:-3847}"
      - "${OPENAI_API_PORT:-8080}:${OPENAI_API_PORT:-8080}"
      - "${PANEL_PORT:-3850}:${PANEL_PORT:-3850}"
    depends_on:
      db:
        condition: service_healthy

  # Persistence backend. Only used when DB_TYPE=mariadb (and the DB_* vars in
  # .env point at this host, e.g. DB_HOST=db). Safe to leave running otherwise.
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: "${DB_NAME:-mmcursor}"
      MARIADB_USER: "${DB_USER:-mmcursor}"
      MARIADB_PASSWORD: "${DB_PASSWORD:-changeme}"
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootchangeme}"
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db-data:
